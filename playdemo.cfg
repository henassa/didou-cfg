bind "space" "demo_pause"
bind "w" "demo_resume"

bind "s" "demo_goto -5s relative; demo_resume"

alias "+demo_fast" "demo_timescale 4"
alias "-demo_fast" "demo_timescale 1"
bind "a" "+demo_fast"

alias "+demo_slow" "demo_timescale 0.25"
alias "-demo_slow" "demo_timescale 1"
bind "d" "+demo_slow"

bind "1" "spec_player 1"
bind "2" "spec_player 2"
bind "3" "spec_player 3"
bind "4" "spec_player 4"
bind "5" "spec_player 5"
bind "6" "spec_player 6"
bind "7" "spec_player 7"
bind "8" "spec_player 8"
bind "9" "spec_player 9"
bind "0" "spec_player 10"

bind "x" "toggle spec_show_xray"

alias "demo_voice_on"  "tv_listen_voice_indices -1; tv_listen_voice_indices_h -1; tv_relaytextchat 2; echo Voice Comms ON"
alias "demo_voice_off" "tv_listen_voice_indices 0;  tv_listen_voice_indices_h 0;  tv_relaytextchat 0; echo Voice Comms OFF"

alias "demo_voice_toggle" "demo_voice_on"
alias "demo_voice_switch" "demo_voice_off; alias demo_voice_toggle demo_voice_on"
alias "demo_voice_switch2" "demo_voice_on; alias demo_voice_toggle demo_voice_off"

bind "c" "demo_voice_switch2"

bind "q" "demoui" 

cl_showpos 1
